<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>McQueen AI Detection Chatbox</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body{background:url('/static/bg.jpg') center/cover no-repeat fixed; color:#1a2a3a; margin:0; font-family:Inter, system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', Arial}
    header{height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 20px;background:transparent}
    .left{font-weight:700;letter-spacing:0.6px;color:#fff}
    .right{display:flex;gap:8px}

    /* Chat container, full page feel (no boxed conversation) */
    .chat-wrap{max-width:980px;margin:18px auto;padding:0 18px;min-height:calc(100vh - 120px);display:flex;flex-direction:column}
    #messages{flex:1;overflow:auto;padding:18px 12px 40px 12px;display:flex;flex-direction:column;gap:12px}

    .bubble{display:inline-block;max-width:78%;padding:12px 14px;border-radius:14px;line-height:1.4;font-size:15px;box-shadow:0 2px 8px rgba(0,0,0,0.06)}
    .user{align-self:flex-end;background:linear-gradient(90deg,#3b82f6,#60a5fa);color:#fff;border-bottom-right-radius:6px}
    .assistant{align-self:flex-start;background:rgba(255,255,255,0.95);color:#1a2a3a;border-bottom-left-radius:6px;border:1px solid rgba(0,0,0,0.06)}

    .meta{font-size:12px;opacity:0.7;margin-top:6px}

    .input-row{display:flex;gap:8px;padding:12px 0;border-top:1px solid rgba(0,0,0,0.06);align-items:center}
    .input-row input{flex:1;padding:12px;border-radius:10px;border:1px solid rgba(0,0,0,0.08);background:rgba(255,255,255,0.95);color:#111}
    .send{background:#10b981;border:none;color:#fff;padding:10px 14px;border-radius:10px;cursor:pointer}
    .typing{font-style:italic;opacity:0.85}

    @media (max-width:640px){ .bubble{max-width:92%} .chat-wrap{padding:0 12px} }
  </style>
</head>
<body>
  <header>
    <div class="left">SMART ALERT</div>
    <div class="right">
      <button class="top-btn" id="detectionBtn" onclick="location.href='/index.html'">DETECTION PAGE</button>
    </div>
  </header>

  <main class="chat-wrap">
    <div id="messages" aria-live="polite" role="log"></div>

    <div class="input-row">
      <input id="chatInput" placeholder="Describe what's happening briefly (e.g. 'fire', 'someone breaking in')" autocomplete="off" />
      <button id="sendBtn" class="send">Send</button>
    </div>
  </main>

  <script src="/static/chat.js"></script>
</body>
</html>
