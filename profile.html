<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Profile - Smart Alert</title>
  <link rel="stylesheet" href="/static/style.css">
  <style>
    body { background: url('/static/bg.jpg') center/cover no-repeat fixed; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial; }
    .container { min-height: calc(100vh - 120px); display:flex; align-items:center; justify-content:center; padding:40px 20px; }
    .card { width:100%; max-width:720px; background: linear-gradient(180deg, rgba(255,255,255,0.98), rgba(250,250,250,0.99)); border-radius:14px; box-shadow: 0 14px 40px rgba(10,20,30,0.12); padding:28px; position:relative }
    .profile-top { display:flex; flex-direction:row; align-items:center; gap:16px; margin-bottom:18px; }
    .avatar { width:110px; height:110px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 6px 18px rgba(0,0,0,0.08); overflow:hidden; position:relative }
    .avatar img { width:88px; height:88px; border-radius:50% }
    .profile-meta { display:flex; flex-direction:column }
    h1.name { margin:0; font-size:20px; color:#111; }
    p.role { margin:6px 0 0; color:#444; font-weight:600 }

    form.profile-form { margin-top:8px; }
    .field { display:flex; flex-direction:column; margin-bottom:12px; }
    .field label { font-weight:600; color:#333; margin-bottom:6px; font-size:13px; }
    .field input, .field select { padding:10px 12px; border-radius:10px; border:1px solid #e6e6e6; font-size:14px; background:#fff; outline:none; transition:box-shadow .12s ease, border-color .12s ease; }
    .field input:focus, .field select:focus { box-shadow:0 8px 24px rgba(34,111,232,0.08); border-color:rgba(34,111,232,0.6); }

    .actions { display:flex; gap:10px; justify-content:center; margin-top:16px; }
    .btn { padding:10px 16px; border-radius:10px; border:0; cursor:pointer; font-weight:600; }
    .btn.primary { background:linear-gradient(90deg,#4f46e5,#06b6d4); color:white; }
    .btn.ghost { background:transparent; border:1px solid #e6e6e6; color:#333; }
    .btn.logout { background:#fff4f2; color:#c2410c; border:1px solid #ffd7ca; }

    .edit-btn { position:relative; margin-left:8px }

    @media (max-width:520px){ .card{ padding:20px } .avatar{ width:92px; height:92px } .profile-top{flex-direction:column;align-items:center} }
  </style>
</head>
<body>
  <header>
    <div class="left">SMART ALERT</div>
    <div class="right">
      <button class="top-btn" id="detectionBtn" onclick="location.href='/index.html'">DETECTION PAGE</button>
    </div>
  </header>

  <div class="container">
    <section class="card" aria-labelledby="profile-heading">
      <div class="profile-top">
        <div class="avatar" id="avatar-wrap">
          <img id="avatar-img" src="/static/avatars/default.svg" alt="avatar">
        </div>
        <div class="profile-meta">
          <div style="display:flex;align-items:center;gap:10px">
            <h1 class="name" id="display-name">Profile</h1>
            <div class="edit-btn">
              <button id="editBtn" class="btn ghost">Edit</button>
              <button id="saveBtn" class="btn primary" style="display:none;">Save</button>
            </div>
          </div>
          <p id="display-role" class="role"></p>
        </div>
      </div>

      <form id="profile-form" class="profile-form" onsubmit="return false;">
        <!-- Fields collected during signup (only those) -->
        <div class="field">
          <label for="userType">User Type</label>
          <input id="userType" name="userType" placeholder="User Type" disabled>
        </div>

        <div class="field">
          <label for="fullName">Full Name</label>
          <input id="fullName" name="fullName" placeholder="Your full name" disabled>
        </div>

        <div class="field">
          <label for="email_display">Email (primary)</label>
          <input id="email_display" name="email_display" placeholder="Email" disabled>
        </div>

        <div class="field">
          <label for="mobile">Mobile Number</label>
          <input id="mobile" name="mobile" placeholder="Mobile number" disabled>
        </div>

        <div class="field">
          <label for="camera_ip">Camera IP</label>
          <input id="camera_ip" name="camera_ip" placeholder="Camera IP" disabled>
        </div>

        <div class="field">
          <label for="alert_email">Alert Email</label>
          <input id="alert_email" name="alert_email" placeholder="Alert Email" disabled>
        </div>

        <div class="field">
          <label for="police_number">Police Number</label>
          <input id="police_number" name="police_number" placeholder="Police number" disabled>
        </div>

        <div class="field">
          <label for="fire_number">Fire Engine Number</label>
          <input id="fire_number" name="fire_number" placeholder="Fire engine number" disabled>
        </div>

        <div class="field">
          <label for="ambulance_number">Ambulance Number</label>
          <input id="ambulance_number" name="ambulance_number" placeholder="Ambulance number" disabled>
        </div>

        <!-- Removed extended official fields as requested -->

        <div class="field">
          <label for="office_address">Office Address</label>
          <input id="office_address" name="office_address" placeholder="Office address" disabled>
        </div>

        <div style="margin-top:18px;text-align:center">
          <button id="logoutBtn" class="btn logout">Logout</button>
        </div>
      </form>
    </section>
  </div>

  <script>
    // Load profile and populate fields (map signup keys only)
    let currentUserEmail = '';
    async function fetchProfile(){
      try{
        const res = await fetch('/api/me');
        if(!res.ok) throw new Error('No profile');
        const data = await res.json();
        currentUserEmail = data.email || '';
        document.getElementById('display-name').textContent = data.fullName || data.name || 'Your Profile';
        document.getElementById('display-role').textContent = data.userType || data.type || '';

        // mapping for signup fields only (trimmed to registration fields)
        const fields = [
          'userType','fullName','mobile','camera_ip','alert_email','police_number','fire_number','ambulance_number','office_address'
        ];
        fields.forEach(k => {
          const el = document.getElementById(k);
          if(!el) return;
          el.value = data[k] || '';
        });
        // email displayed separately (not editable here)
        const emailEl = document.getElementById('email_display');
        if(emailEl) emailEl.value = data.email || '';

        // show avatar if user has one, else keep default
        if(data.avatar){
          document.getElementById('avatar-img').src = data.avatar;
        } else {
          document.getElementById('avatar-img').src = '/static/avatars/default.svg';
        }
      }catch(err){
        console.warn('Could not load profile', err);
      }
    }

    function setEditing(editing){
      const inputs = document.querySelectorAll('#profile-form input, #profile-form select, #profile-form textarea');
      inputs.forEach(i => i.disabled = !editing);
      document.getElementById('saveBtn').style.display = editing ? 'inline-block' : 'none';
      document.getElementById('editBtn').style.display = editing ? 'none' : 'inline-block';
    }

    document.getElementById('editBtn').addEventListener('click', (e)=>{ e.preventDefault(); setEditing(true); window.scrollTo({top:0,behavior:'smooth'}); });

    document.getElementById('saveBtn').addEventListener('click', async (e)=>{
      e.preventDefault();
      // collect values for all editable fields (exclude password fields)
      // Use stored email (email_display may be disabled)
      const payload = { email: currentUserEmail || document.getElementById('email_display').value };
      const editable = ['userType','fullName','mobile','camera_ip','alert_email','police_number','fire_number','ambulance_number','office_address'];
      editable.forEach(k => {
        const el = document.getElementById(k);
        if(!el) return;
        payload[k] = el.value.trim();
      });
      try{
        const res = await fetch('/api/update_profile', {
          method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(payload)
        });
        const j = await res.json().catch(()=>null);
        if(!res.ok || (j && j.error)){
          console.error('Save failed', j);
          alert('Could not save profile: ' + (j && j.error ? j.error : res.statusText));
          return;
        }
        // refresh profile and exit edit mode
        await fetchProfile();
        setEditing(false);
        alert('Profile updated');
      }catch(err){
        console.error(err); alert('Could not save profile');
      }
    });

    document.getElementById('logoutBtn').addEventListener('click',(e)=>{ e.preventDefault(); window.location='/logout'; });

    // init
    fetchProfile();
    setEditing(false);
  </script>
</body>
</html>
