<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART ALERT - Home</title>

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: url('/static/bg.jpg') center/cover no-repeat fixed;
    height: 100vh;
    overflow-x: hidden;
    opacity: 0; /* fade-in start */
    transition: opacity 0.35s ease;
}

body.fade-out {
    opacity: 0;
}

body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.10);
    pointer-events: none;
}

header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    background: #000;
}

.logo {
    font-size: 22px;
    font-weight: 600;
    color: #ffffff;
}

header nav {
    display: flex;
    gap: 14px;
}

header nav a {
    text-decoration: none;
    font-size: 15px;
    color: #fff;
    border: 1px solid white;
    padding: 6px 14px;
    border-radius: 6px;
    transition: .3s;
}

header nav a:hover {
    background: white;
    color: black;
}

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 5;
    padding-top: 80px;
}

.card {
    width: 350px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    text-align: center;
    opacity: 0; 
    transform: translateY(20px);
    animation: fadeUp 0.5s ease forwards 0.15s;
}

@keyframes fadeUp {
    to {
        opacity: 1;
        transform: translateY(0);
    }
}

.card h2 {
    font-size: 26px;
    margin-bottom: 25px;
    font-weight: 600;
    color: #333;
}

.get-started-btn {
    background: linear-gradient(90deg, #007bff, #00c0ff);
    color: white;
    padding: 14px 30px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: 0.3s;
    width: 100%;
}

.get-started-btn:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
</style>
</head>

<body>

<header>
    <div class="logo">SMART ALERT</div>
    <nav style="margin-right:36px;">
        <a href="/main.html">Home</a>
        <a href="/how_it_works">How it Works</a>
        <a href="/guidelines.html">Guidelines</a>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h2>Welcome to SMART ALERT</h2>
        <button class="get-started-btn" onclick="fadeTo('/login')">Get Started</button>
    </div>
</div>

<script>
// Fade-in on load
window.onload = () => {
    document.body.style.opacity = 1;
};

// Fade-out function
function fadeTo(url) {
    document.body.classList.add("fade-out");
    setTimeout(() => { window.location.href = url; }, 350);
}

// Fade-out for nav links (header only)
document.querySelectorAll('header nav a').forEach(link => {
    link.addEventListener("click", function(e) {
        e.preventDefault();
        fadeTo(this.href);
    });
});
</script>

</body>
</html>
