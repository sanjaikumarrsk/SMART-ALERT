<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART ALERT - Login</title>

<style>
body {
    margin: 0;
    font-family: "Poppins", sans-serif;
    background: url('/static/bg.jpg') center/cover no-repeat fixed;
    height: 100vh;
    overflow-x: hidden;
    opacity: 0;
    animation: fadeInBody 0.45s ease-in-out forwards;
}
@keyframes fadeInBody { from { opacity: 0; } to { opacity: 1; } }
body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.10);
    pointer-events: none;
}

header {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 16px 24px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    z-index: 10;
    background: #000;
    opacity: 0;
    animation: fadeInHeader 0.45s ease-in-out forwards;
}
@keyframes fadeInHeader { from { opacity: 0; } to { opacity: 1; } }

header a {
    text-decoration: none;
    font-size: 15px;
    color: #fff;
    border: 1px solid white;
    padding: 6px 14px;
    border-radius: 6px;
    transition: .3s;
    opacity: 0;
    animation: fadeInNav 0.45s ease-in-out forwards;
}
@keyframes fadeInNav { from { opacity: 0; } to { opacity: 1; } }
header a:hover { background: white; color: black; }

.container {
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    position: relative;
    z-index: 5;
    padding-top: 80px;
}

.card {
    width: 350px;
    background: rgba(255,255,255,0.95);
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 8px 25px rgba(0,0,0,0.2);
    text-align: center;
    opacity: 0;
    transform: translateY(20px);
    animation: fadeInCard 0.5s ease forwards;
}
@keyframes fadeInCard { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

.card h2 { font-size: 26px; margin-bottom: 25px; font-weight: 600; color: #333; }
.card input, .card select {
    width: 90%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}
.card button {
    width: 95%;
    padding: 12px;
    font-size: 17px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 12px;
    background: linear-gradient(90deg, #007bff, #00c0ff);
    color: white;
    transition: 0.3s;
}
.card button:hover {
    transform: scale(1.03);
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}
.card p { font-size: 14px; margin-top: 15px; color: #333; }
.card a { color: #007bff; text-decoration: none; font-weight: 600; }
.card a:hover { text-decoration: underline; }

/* Fade-out transition */
.fade-out { opacity: 0; transition: opacity 0.6s ease; }
</style>

<script>
function validateLogin() {
    // legacy client-side validator, server handles real auth
    return false;
}

window.onload = () => { document.body.style.opacity = 1; }
</script>
</head>

<body>
<header>
    <div class="logo" style="font-weight:700;color:#fff;">SMART ALERT</div>
    <nav style="margin-right:36px;">
        <a href="/main.html">Home</a>
    </nav>
</header>

<div class="container">
    <div class="card">
        <h2>Login</h2>
        <form action="/login" method="post">
            <select name="userType" id="userType" required>
                <option value="Citizen" selected>Citizen</option>
                <option value="Govt">Govt Official</option>
            </select>
            <input type="email" name="email" id="email" placeholder="Email" required>
            <input type="password" name="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
        </form>
        <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
